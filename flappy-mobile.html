<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird - Mobile Friendly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 800px;
            background: linear-gradient(to bottom, #87CEEB 0%, #98D8E8 100%);
            border: 4px solid #5D4037;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            z-index: 20;
        }

        #high-score {
            position: absolute;
            top: 80px;
            right: 20px;
            font-size: 18px;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            z-index: 20;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            z-index: 100;
            transition: opacity 0.3s;
        }

        #instructions.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            text-align: center;
        }

        #game-over-screen.active {
            display: flex;
        }

        #game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #FF6B6B;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 20px;
        }

        #final-score {
            font-size: 32px;
            margin: 10px 0;
        }

        #best-score {
            font-size: 24px;
            color: #FFD700;
            margin-bottom: 30px;
        }

        #restart-btn {
            background: linear-gradient(to bottom, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2d6b2f, 0 8px 16px rgba(0,0,0,0.3);
            transition: all 0.1s;
            pointer-events: auto;
        }

        #restart-btn:hover {
            background: linear-gradient(to bottom, #66BB6A, #4CAF50);
        }

        #restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2d6b2f, 0 4px 8px rgba(0,0,0,0.3);
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
            text-align: center;
        }

        #start-screen.hidden {
            display: none;
        }

        #game-title {
            font-size: 42px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 20px;
        }

        #start-instructions {
            font-size: 18px;
            margin: 10px 0;
            line-height: 1.6;
        }

        #start-btn {
            background: linear-gradient(to bottom, #2196F3, #1976D2);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0D47A1, 0 8px 16px rgba(0,0,0,0.3);
            transition: all 0.1s;
            margin-top: 30px;
            pointer-events: auto;
        }

        #start-btn:hover {
            background: linear-gradient(to bottom, #42A5F5, #2196F3);
        }

        #start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0D47A1, 0 4px 8px rgba(0,0,0,0.3);
        }

        .instruction-example {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }

        .key {
            background: #333;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            border: 2px solid #555;
            box-shadow: 0 3px 0 #222;
        }

        #mobile-instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 30px;
            border-radius: 16px;
            font-size: 20px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        #mobile-instructions.visible {
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @media (max-width: 600px) {
            #game-container {
                border: none;
                border-radius: 0;
                max-height: 100vh;
            }

            #game-title, #game-over-title {
                font-size: 32px;
            }

            #start-btn, #restart-btn {
                font-size: 20px;
                padding: 14px 40px;
            }

            #score-display {
                font-size: 36px;
            }
        }

        @media (hover: none) and (pointer: coarse) {
            #desktop-instructions {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-overlay">
            <div id="score-display">0</div>
            <div id="high-score">Best: 0</div>
        </div>

        <div id="start-screen">
            <div id="game-title">🐦 Flappy Bird</div>
            <div id="start-instructions">
                <div class="instruction-example">
                    <span class="key">SPACE</span>
                    <span>or</span>
                    <span class="key">CLICK</span>
                    <span>to flap</span>
                </div>
                <div class="instruction-example">
                    <span>TAP anywhere</span>
                    <span>on mobile</span>
                </div>
                <div style="margin-top: 20px; font-size: 16px; opacity: 0.9;">
                    Navigate through the towers! 🏢
                </div>
            </div>
            <button id="start-btn">START</button>
        </div>

        <div id="game-over-screen">
            <div id="game-over-title">GAME OVER</div>
            <div id="final-score">Score: 0</div>
            <div id="best-score">Best: 0</div>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>

        <div id="mobile-instructions">TAP to flap!</div>
    </div>

    <script>
        // Game Configuration
        const CONFIG = {
            gravity: 0.35,
            jumpForce: -8,
            birdX: 100,
            pipeSpeed: 2,
            pipeGap: 160,
            pipeFrequency: 2000,
            pipeWidth: 70,
            groundHeight: 80,
            birdRadius: 20,
            scorePerPipe: 1
        };

        // Game State
        let state = {
            bird: {
                y: 0,
                velocity: 0,
                rotation: 0
            },
            pipes: [],
            score: 0,
            highScore: parseInt(localStorage.getItem('flappyHighScore') || '0'),
            gameRunning: false,
            gameStarted: false,
            lastPipeTime: 0,
            gameLoopId: null
        };

        // DOM Elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const mobileInstructions = document.getElementById('mobile-instructions');
        const finalScoreDisplay = document.getElementById('final-score');
        const bestScoreDisplay = document.getElementById('best-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Set canvas size
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            if (state.gameStarted && !state.gameRunning) {
                resetGame();
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Bird class
        class Bird {
            constructor() {
                this.x = CONFIG.birdX;
                this.y = canvas.height / 2;
                this.radius = CONFIG.birdRadius;
                this.velocity = 0;
                this.rotation = 0;
            }

            update() {
                this.velocity += CONFIG.gravity;
                this.y += this.velocity;

                // Rotation based on velocity
                this.rotation = Math.min(Math.max(this.velocity * 4, -30), 90);

                // Ground collision
                if (this.y + this.radius > canvas.height - CONFIG.groundHeight) {
                    this.y = canvas.height - CONFIG.groundHeight - this.radius;
                    return true; // Collision
                }

                // Ceiling collision (optional)
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }

                return false;
            }

            flap() {
                this.velocity = CONFIG.jumpForce;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);

                // Body (yellow)
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius, this.radius * 0.8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Wing (orange)
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath();
                ctx.ellipse(-5, 5, this.radius * 0.6, this.radius * 0.3, -0.3, 0, Math.PI * 2);
                ctx.fill();

                // Eye (white)
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(8, -5, 7, 0, Math.PI * 2);
                ctx.fill();

                // Pupil (black)
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(10, -5, 4, 0, Math.PI * 2);
                ctx.fill();

                // Beak (orange)
                ctx.fillStyle = '#FF6347';
                ctx.beginPath();
                ctx.moveTo(10, 0);
                ctx.lineTo(25, 3);
                ctx.lineTo(10, 6);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }
        }

        // Pipe class
        class Pipe {
            constructor(x) {
                this.x = x;
                this.width = CONFIG.pipeWidth;
                this.gap = CONFIG.pipeGap;
                this.groundY = canvas.height - CONFIG.groundHeight;

                // Random gap position (but not too close to edges)
                const minGapTop = 100;
                const maxGapBottom = this.groundY - 100;
                this.gapTop = Math.random() * (maxGapBottom - minGapTop - this.gap) + minGapTop;
                this.gapBottom = this.gapTop + this.gap;

                this.passed = false;
            }

            update() {
                this.x -= CONFIG.pipeSpeed;
            }

            draw() {
                // Twin Towers style - silver/grey buildings
                const towerGradient = ctx.createLinearGradient(this.x, 0, this.x + this.width, 0);
                towerGradient.addColorStop(0, '#4A4A4A');
                towerGradient.addColorStop(0.3, '#8A8A8A');
                towerGradient.addColorStop(0.5, '#A0A0A0');
                towerGradient.addColorStop(0.7, '#8A8A8A');
                towerGradient.addColorStop(1, '#4A4A4A');

                // Top tower
                ctx.fillStyle = towerGradient;
                ctx.fillRect(this.x, 0, this.width, this.gapTop);

                // Top tower windows
                ctx.strokeStyle = '#2A2A2A';
                ctx.lineWidth = 1;
                for (let row = 10; row < this.gapTop - 10; row += 12) {
                    for (let col = 5; col < this.width - 5; col += 8) {
                        ctx.strokeRect(this.x + col, row, 5, 8);
                    }
                }

                // Top tower roof/antenna area
                ctx.fillStyle = '#3A3A3A';
                ctx.fillRect(this.x + this.width/2 - 3, 0, 6, 20);

                // Bottom tower
                ctx.fillStyle = towerGradient;
                ctx.fillRect(this.x, this.gapBottom, this.width, this.groundY - this.gapBottom);

                // Bottom tower windows
                ctx.strokeStyle = '#2A2A2A';
                for (let row = this.gapBottom + 10; row < this.groundY - 10; row += 12) {
                    for (let col = 5; col < this.width - 5; col += 8) {
                        ctx.strokeRect(this.x + col, row, 5, 8);
                    }
                }

                // Bottom tower base
                ctx.fillStyle = '#3A3A3A';
                ctx.fillRect(this.x - 5, this.groundY - 15, this.width + 10, 15);
            }

            checkCollision(bird) {
                const birdLeft = bird.x - bird.radius;
                const birdRight = bird.x + bird.radius;
                const birdTop = bird.y - bird.radius;
                const birdBottom = bird.y + bird.radius;

                const pipeLeft = this.x;
                const pipeRight = this.x + this.width;

                // Check if bird is horizontally aligned with pipe
                if (birdRight > pipeLeft && birdLeft < pipeRight) {
                    // Check if bird hits top or bottom pipe
                    if (birdTop < this.gapTop || birdBottom > this.gapBottom) {
                        return true;
                    }
                }

                return false;
            }

            isOffScreen() {
                return this.x + this.width < 0;
            }

            isPassed(bird) {
                if (!this.passed && bird.x > this.x + this.width) {
                    this.passed = true;
                    return true;
                }
                return false;
            }
        }

        // Draw ground
        function drawGround() {
            const groundY = canvas.height - CONFIG.groundHeight;

            // Ground base
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, groundY, canvas.width, CONFIG.groundHeight);

            // Ground pattern
            ctx.fillStyle = '#654321';
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.fillRect(i, groundY, 20, CONFIG.groundHeight);
            }

            // Grass
            ctx.fillStyle = '#7CFC00';
            ctx.fillRect(0, groundY, canvas.width, 10);
        }

        // Draw clouds
        function drawCloud(x, y, size) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.2, size * 0.8, 0, Math.PI * 2);
            ctx.arc(x + size * 1.5, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.7, y + size * 0.3, size * 0.6, 0, Math.PI * 2);
            ctx.fill();
        }

        let clouds = [];
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 5; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height / 3),
                    size: 20 + Math.random() * 20,
                    speed: 0.3 + Math.random() * 0.4
                });
            }
        }

        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Clouds
            clouds.forEach(cloud => {
                drawCloud(cloud.x, cloud.y, cloud.size);
                cloud.x -= cloud.speed;
                if (cloud.x < -100) {
                    cloud.x = canvas.width + 100;
                    cloud.y = Math.random() * (canvas.height / 3);
                }
            });
        }

        // Game logic
        let bird;

        function resetGame() {
            bird = new Bird();
            state.pipes = [];
            state.score = 0;
            state.lastPipeTime = Date.now();
            scoreDisplay.textContent = '0';
        }

        function startGame() {
            startScreen.classList.add('hidden');
            mobileInstructions.classList.remove('visible');
            state.gameStarted = true;
            state.gameRunning = true;
            resetGame();
            state.gameLoopId = requestAnimationFrame(gameLoop);

            // Show mobile instructions briefly
            if ('ontouchstart' in window) {
                mobileInstructions.classList.add('visible');
                setTimeout(() => {
                    mobileInstructions.classList.remove('visible');
                }, 2000);
            }
        }

        function gameOver() {
            state.gameRunning = false;
            cancelAnimationFrame(state.gameLoopId);

            // Update high score
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('flappyHighScore', state.highScore.toString());
            }

            // Update displays
            finalScoreDisplay.textContent = `Score: ${state.score}`;
            bestScoreDisplay.textContent = `Best: ${state.highScore}`;
            highScoreDisplay.textContent = `Best: ${state.highScore}`;

            // Show game over screen
            gameOverScreen.classList.add('active');
        }

        function gameLoop() {
            if (!state.gameRunning) return;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background
            drawBackground();

            // Update and draw bird
            const collision = bird.update();
            bird.draw();

            // Generate new pipes
            if (Date.now() - state.lastPipeTime > CONFIG.pipeFrequency) {
                state.pipes.push(new Pipe(canvas.width));
                state.lastPipeTime = Date.now();
            }

            // Update and draw pipes
            for (let i = state.pipes.length - 1; i >= 0; i--) {
                const pipe = state.pipes[i];
                pipe.update();

                // Check collision
                if (pipe.checkCollision(bird)) {
                    gameOver();
                    return;
                }

                // Check if pipe passed
                if (pipe.isPassed(bird)) {
                    state.score += CONFIG.scorePerPipe;
                    scoreDisplay.textContent = state.score;
                }

                // Remove off-screen pipes
                if (pipe.isOffScreen()) {
                    state.pipes.splice(i, 1);
                }

                pipe.draw();
            }

            // Draw ground
            drawGround();

            // Check ground collision
            if (collision) {
                gameOver();
                return;
            }

            state.gameLoopId = requestAnimationFrame(gameLoop);
        }

        // Input handlers
        function handleInput(e) {
            if (e.type === 'keydown' && e.code !== 'Space' && e.code !== 'KeyUp' && e.code !== 'ArrowUp') {
                return;
            }

            if (!state.gameStarted) {
                startGame();
                return;
            }

            if (state.gameRunning) {
                bird.flap();
            }
        }

        // Keyboard
        document.addEventListener('keydown', handleInput);

        // Mouse
        document.addEventListener('mousedown', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                handleInput(e);
            }
        });

        // Touch
        document.addEventListener('touchstart', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                e.preventDefault();
                handleInput(e);
            }
        }, { passive: false });

        // Button handlers
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.remove('active');
            startGame();
        });

        // Prevent context menu on mobile
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // Initialize
        highScoreDisplay.textContent = `Best: ${state.highScore}`;
        initClouds();

        // Draw initial state
        function drawInitial() {
            drawBackground();
            drawGround();

            // Draw a sample bird
            const sampleBird = new Bird();
            sampleBird.y = canvas.height / 2;
            sampleBird.rotation = 0;
            sampleBird.draw();
        }
        drawInitial();

        // Store reference for debugging
        window.gameState = state;
    </script>
</body>
</html>
